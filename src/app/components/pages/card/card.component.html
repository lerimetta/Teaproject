<div class="col col-sm-4 mx-auto text-center">
  <div class="card mb-5">
    <a class="test-popup-link" href="assets/images/image3.png">
      <img src="{{product.image}} " class="card-img-top" alt="чай">
    </a>
    <div class="card-body col">
      <h3 class="card-title h5 fw-bold">{{product.title}}</h3>
      <p class="card-text">{{product.description}}</p>
      <p>Цена: {{product.price}} рублей</p>
      <a class="btn btn-primary px-5 hvr-sink" (click)="addToCart(product.title)">Купить</a>
    </div>
  </div>
</div>
