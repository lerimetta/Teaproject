<div class="container">
  <h1 class="fw-bold text-center h2 my-5">Наши чайные коллекции</h1>
  <div class="row row-cols-md-3 gy-4 wow animate__backInLeft pb-5">
    <div class="col" *ngFor="let product of products">
      <div class="card h-100">
        <a class="test-popup-link">
          <img src="{{product.image}}" class="card-img-top " alt="чай">
        </a>
        <div class="card-body col d-flex flex-column">
          <h3 class="card-title h5 fw-bold">{{product.title}}</h3>
          <p class="card-text flex-grow-1">{{product.description|maxSymbols}}</p>
          <a class="btn btn-primary px-5 align-self-start hvr-sink" [routerLink]="['/catalog',product.id]">Подробнее</a>
        </div>
      </div>
    </div>
  </div>
</div>
